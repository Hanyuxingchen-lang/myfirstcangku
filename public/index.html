<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分布式大文件分片上传系统</title>
    <style>
        :root {
            --klein-blue: #002fa7;
            --klein-light: rgba(0, 47, 167, 0.15);
            --glass-white: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(0, 47, 167, 0.12);
            --shadow-soft: 0 8px 32px rgba(0, 47, 167, 0.08);
            --shadow-deep: 0 12px 48px rgba(0, 47, 167, 0.14);
            --color-wait: #b0c4de;
            --color-doing: #002fa7;
            --color-done: #00965e;
            --color-fail: #d83636;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #ffffff;
            overflow-x: hidden;
            position: relative;
        }
        /* 数据流SVG */
        .data-flow-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .flow-line {
            fill: none;
            stroke: var(--klein-blue);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 12 8;
            animation: lineFlow 1.2s linear infinite;
            opacity: 0.4;
        }
        .flow-dot {
            r: 4;
            fill: var(--klein-blue);
            filter: drop-shadow(0 0 6px var(--klein-blue));
        }
        /* 背景 */
        .tech-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: bg-flow 18s linear infinite;
            opacity: 0.6;
        }
        .light-particle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, var(--klein-blue) 0%, transparent 70%);
            filter: blur(12px);
            opacity: 0.25;
            z-index: 0;
            animation: float 12s ease-in-out infinite alternate;
        }
        .p1 { width: 280px; height: 280px; top: 10%; left: 8%; animation-delay: 0s; }
        .p2 { width: 180px; height: 180px; bottom: 15%; right: 12%; animation-delay: -4s; }
        .p3 { width: 120px; height: 120px; top: 60%; left: 18%; animation-delay: -8s; }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 72px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 99;
            background: var(--glass-white);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-title {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #000 0%, var(--klein-blue) 100%);
            background-clip: text;
            color: transparent;
        }
        .user-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .username-text {
            color: #001a52;
            font-weight: 500;
            font-size: 14px;
        }
        .logout-btn {
            padding: 8px 14px;
            border: 1px solid var(--klein-blue);
            border-radius: 12px;
            background: transparent;
            color: var(--klein-blue);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: var(--klein-light);
        }

        /* 主体容器 */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 96px;
            padding-bottom: 40px;
            padding-left: 24px;
            padding-right: 24px;
            position: relative;
            z-index: 10;
            gap: 32px;
        }
        /* 卡片通用自适应 */
        .upload-card, .panel {
            width: 100%;
            max-width: 920px;
            padding: 36px 24px;
            position: relative;
            background: var(--glass-white);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-deep);
            transition: all 0.4s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .upload-card:hover, .panel:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 64px rgba(0, 47, 167, 0.18);
            border-color: rgba(0, 47, 0.2);
        }
        .card-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #000 0%, var(--klein-blue) 100%);
            background-clip: text;
            color: transparent;
            margin-bottom: 32px;
            text-align: center;
            line-height: 1.4;
        }
        .file-input-wrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }
        #file {
            display: none;
        }
        .file-label {
            width: 100%;
            padding: 16px 20px;
            border: 1.5px dashed var(--klein-blue);
            border-radius: 14px;
            text-align: center;
            color: var(--klein-blue);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 47, 167, 0.04);
        }
        .file-label:hover {
            background: var(--klein-light);
            border-color: var(--klein-blue);
        }
        .upload-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--klein-blue);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 47, 167, 0.22);
        }
        .upload-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 47, 167, 0.28);
        }
        .upload-btn:active {
            transform: translateY(0);
        }
        .progress-wrap {
            height: 14px;
            background: rgba(0, 47, 167, 0.08);
            border-radius: 999px;
            margin: 36px 0 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #002fa7, #0040d0, #002fa7);
            background-size: 200% 100%;
            border-radius: 999px;
            transition: width 0.22s linear;
            animation: flow-shine 1.6s linear infinite;
        }
        .tip-text {
            text-align: center;
            font-size: 15px;
            color: #001a52;
            min-height: 24px;
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-bottom: 24px;
        }
        .panel-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--klein-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .info-export-btn{
            padding:6px 14px;
            border:1px solid var(--klein-blue);
            border-radius:8px;
            background:transparent;
            color:var(--klein-blue);
            cursor:pointer;
        }
        .info-export-btn:hover{
            background:var(--klein-light);
        }
        /* 文件信息网格 */
        .file-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .info-item {
            padding: 14px;
            background: rgba(0,47,167,0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }
        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: #001a52;
            word-break: break-all;
        }
        /* 分片网格 */
        .chunk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(26px, 1fr));
            gap: 6px;
            min-height: 60px;
        }
        .chunk-block {
            height: 26px;
            border-radius: 5px;
            background: var(--color-wait);
            transition: all 0.25s ease;
        }
        .chunk-doing {
            background: var(--color-doing);
            animation: chunk-pulse 0.8s infinite alternate;
        }
        .chunk-done {
            background: var(--color-done);
        }
        /* 日志面板 */
        .log-box {
            margin-top: 16px;
            height: 140px;
            padding: 14px;
            background: #000a20;
            border-radius: 12px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: 12px;
            color: #89c4ff;
            line-height: 1.6;
        }
        .log-line {
            margin-bottom: 4px;
        }
        .log-success {
            color: #71e0a8;
        }
        .log-warn {
            color: #ffdd70;
        }
        .log-info {
            color: #89c4ff;
        }
        /* 测试记录表格样式 */
        .table-wrap{
            overflow-x:auto;
        }
        table{
            width:100%;
            border-collapse: collapse;
            min-width:720px;
        }
        th,td{
            border:1px solid var(--glass-border);
            padding:10px 8px;
            font-size:13px;
            text-align:center;
        }
        th{
            background:rgba(0,47,167,0.08);
            color:var(--klein-blue);
        }
        .status-success{color:var(--color-done);font-weight:500;}
        .status-merging{color:var(--color-doing);}
        .status-wait{color:#666;}
        .status-fail{color:var(--color-fail);}
        .page-bar{
            margin-top:16px;
            display:flex;
            gap:10px;
            justify-content:center;
            align-items:center;
        }
        .page-btn{
            padding:5px 12px;
            border:1px solid var(--glass-border);
            border-radius:6px;
            background:#fff;
            cursor:pointer;
        }
        .page-btn:disabled{
            opacity:0.4;
            cursor:not-allowed;
        }

        /* 动画 */
        @keyframes bg-flow {0% { background-position: 0 0; }100% { background-position: 60px 60px; }}
        @keyframes float {0% { transform: translate(0, 0) scale(1); }100% { transform: translate(40px, -30px) scale(1.12); }}
        @keyframes flow-shine {0% { background-position: 0 0; }100% { background-position: 200% 0; }}
        @keyframes chunk-pulse {0% { opacity: 0.7; transform: scale(0.96); }100% { opacity: 1; transform: scale(1); }}
        @keyframes lineFlow {0% { stroke-dashoffset: 0; }100% { stroke-dashoffset: -20; }}
    </style>
</head>
<body>
    <svg class="data-flow-svg" viewBox="0 0 1920 1080">
        <path id="path1" class="flow-line" d="M 960 320 L 960 460" />
        <circle class="flow-dot"><animateMotion dur="2s" repeatCount="indefinite" path="M 960 320 L 960 460" /></circle>
        <path id="path2" class="flow-line" d="M 960 540 L 960 680" />
        <circle class="flow-dot"><animateMotion dur="2.2s" repeatCount="indefinite" path="M 960 540 L 960 680" /></circle>
        <path id="path3" class="flow-line" d="M 960 760 L 960 900" />
        <circle class="flow-dot"><animateMotion dur="2.4s" repeatCount="indefinite" path="M 960 760 L 960 900" /></circle>
    </svg>

    <div class="tech-bg"></div>
    <div class="light-particle p1"></div>
    <div class="light-particle p2"></div>
    <div class="light-particle p3"></div>

    <div class="navbar">
        <div class="nav-title">分布式大文件分片上传系统</div>
        <div class="user-wrap">
            <span class="username-text" id="userText"></span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <div class="upload-card">
            <h2 class="card-title">基于双节点集群的大文件分片上传演示</h2>
            <div class="file-input-wrap">
                <label class="file-label" for="file">点击选择待上传大文件</label>
                <input type="file" id="file" />
                <button class="upload-btn" onclick="uploadFile()">开始上传</button>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="bar"></div>
            </div>
            <div id="tip" class="tip-text"></div>
        </div>

        <div class="panel" id="infoPanel" style="display: none;">
            <h3 class="panel-title">📄 文件基础信息</h3>
            <div class="file-info-grid">
                <div class="info-item"><div class="info-label">文件名称</div><div class="info-value" id="infoName">-</div></div>
                <div class="info-item"><div class="info-label">文件大小</div><div class="info-value" id="infoSize">-</div></div>
                <div class="info-item"><div class="info-label">分片总数</div><div class="info-value" id="infoChunkTotal">-</div></div>
                <div class="info-item"><div class="info-label">文件MD5</div><div class="info-value" id="infoMd5">-</div></div>
            </div>
        </div>

        <div class="panel" id="chunkPanel" style="display: none;">
            <h3 class="panel-title">📦 分片实时上传可视化</h3>
            <div class="chunk-grid" id="chunkGrid"></div>
            <div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;font-size:12px;color:#555;">
                <span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--color-wait);border-radius:4px;"></span>待上传</span>
                <span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--color-doing);border-radius:4px;"></span>上传中</span>
                <span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--color-done);border-radius:4px;"></span>已完成</span>
            </div>
        </div>

        <div class="panel" id="logPanel" style="display: none;">
            <h3 class="panel-title">📡 后端分片交互实时日志</h3>
            <div class="log-box" id="logBox"></div>
        </div>

        <!-- 新增：性能测试记录面板（完全新增区块，原有代码不动） -->
        <div class="panel">
            <h3 class="panel-title">
                📊 上传性能实验测试记录
                <button class="info-export-btn" onclick="exportTableCsv()">导出CSV全部数据</button>
            </h3>
            <div class="table-wrap">
                <table id="recordTable">
                    <thead>
                        <tr>
                            <th>文件MD5</th>
                            <th>文件名</th>
                            <th>文件大小</th>
                            <th>分片数</th>
                            <th>总耗时(ms)</th>
                            <th>峰值内存(MB)</th>
                            <th>任务状态</th>
                            <th>创建时间</th>
                            <th>完成时间</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="9">正在加载数据...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="page-bar">
                <button class="page-btn" id="prevBtn" disabled onclick="changePage(-1)">上一页</button>
                <span id="pageText">第1页 / 共0页</span>
                <button class="page-btn" id="nextBtn" disabled onclick="changePage(1)">下一页</button>
            </div>
        </div>
    </div>

    <script>
        // 全局数据流动画控制
        function toggleDataFlow(flag) {
            const lines = document.querySelectorAll('.flow-line');
            const dots = document.querySelectorAll('.flow-dot animateMotion');
            if(flag === true) {
                lines.forEach(el => el.style.opacity = "0.55");
                dots.forEach(el => el.beginElement());
            } else {
                lines.forEach(el => el.style.opacity = "0");
                dots.forEach(el => el.endElement());
            }
        }
        // 登录鉴权
        window.onload = async function() {
            const user = localStorage.getItem('uploadUser');
            if(!user) {
                location.href = 'login.html';
                return;
            }
            const userInfo = JSON.parse(user);
            document.getElementById('userText').innerText = `${userInfo.username}`;
            toggleDataFlow(false);
            // 页面加载自动读取测试记录
            await loadRecordData();
        }
        function logout() {
            localStorage.removeItem('uploadUser');
            location.href = 'login.html';
        }

        // 上传原有全局变量
        const CHUNK_SIZE = 1024 * 1024 * 2;
        let fileMd5 = '';
        let currentFile = null;
        let totalChunkCount = 0;
        let uploadedChunkArr = [];
        // 分页全局变量
        let currentPage = 1;
        let pageSize = 12;
        let totalPage = 0;
        let allRecordList = [];
        // 允许上传的文件后缀（可自行增删）
        const allowExt = ['mp4','mov','avi','mkv','zip','rar','7z','tar','gz','pdf','doc','docx','xls','xlsx','ppt','pptx'];

        // 工具：格式化文件大小
        function formatFileSize(bytes) {
            if (!bytes || bytes <= 0) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }
        // 校验文件类型
        function checkFileType(file) {
            const fileName = file.name;
            const ext = fileName.split('.').pop().toLowerCase();
            return allowExt.includes(ext);
        }
        function addLog(text, type = 'log-info') {
            const logBox = document.getElementById('logBox');
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const now = new Date().toLocaleTimeString();
            line.innerText = `[${now}] ${text}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }
        function initChunkGrid(total) {
            totalChunkCount = total;
            const grid = document.getElementById('chunkGrid');
            grid.innerHTML = '';
            for(let i=0; i<total; i++){
                const block = document.createElement('div');
                block.className = 'chunk-block';
                block.dataset.index = i;
                grid.appendChild(block);
            }
        }
        function updateChunkStatus(index, status) {
            const block = document.querySelector(`.chunk-block[data-index="${index}"]`);
            if(!block) return;
            block.classList.remove('chunk-doing', 'chunk-done');
            if(status === 'doing') block.classList.add('chunk-doing');
            if(status === 'done') block.classList.add('chunk-done');
        }
        async function getFileMd5(file) {
            addLog("开始计算文件MD5哈希值...", 'log-info');
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('MD5', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const md5Str = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            addLog(`MD5计算完成：${md5Str}`, 'log-success');
            return md5Str;
        }

        // 原有上传逻辑 + 新增文件类型校验
        async function uploadFile() {
            const file = document.getElementById('file').files[0];
            if(!file) return alert('请选择文件');
            // 新增文件类型校验逻辑，匹配报错提示
            if(!checkFileType(file)){
                alert("当前不支持该文件类型，请尝试其他文件");
                return;
            }
            currentFile = file;
            document.getElementById('infoPanel').style.display = 'block';
            document.getElementById('chunkPanel').style.display = 'block';
            document.getElementById('logPanel').style.display = 'block';
            toggleDataFlow(true);

            document.getElementById('infoName').innerText = file.name;
            document.getElementById('infoSize').innerText = formatFileSize(file.size);
            document.getElementById('tip').innerText = '正在计算文件MD5...';
            fileMd5 = await getFileMd5(file);
            document.getElementById('infoMd5').innerText = fileMd5;

            addLog("请求后端接口：查询已上传分片 /api/chunk/check", 'log-info');
            const res = await fetch('/api/chunk/check', {
                method:'POST',
                body:JSON.stringify({fileMd5}),
                headers:{'Content-Type':'application/json'}
            })
            const {data} = await res.json();
            uploadedChunkArr = data.map(item => Number(item));
            addLog(`后端返回已上传分片：${uploadedChunkArr.join(',')}`, 'log-warn');

            const totalChunk = Math.ceil(file.size / CHUNK_SIZE);
            totalChunkCount = totalChunk;
            document.getElementById('infoChunkTotal').innerText = totalChunk;
            initChunkGrid(totalChunk);
            uploadedChunkArr.forEach(idx => updateChunkStatus(idx, 'done'));

            document.getElementById('tip').innerText = '开始分片上传';
            addLog(`文件总分片数：${totalChunk}，准备循环上传`, 'log-info');

            for(let i=0;i<totalChunk;i++){
                if(uploadedChunkArr.includes(i)) {
                    addLog(`分片${i}已存在，跳过上传（断点续传）`, 'log-warn');
                    continue;
                }
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunkFile = file.slice(start,end);
                const form = new FormData();
                form.append('file',chunkFile);
                form.append('fileMd5',fileMd5);
                form.append('chunkIndex',i);
                form.append('totalChunk',totalChunk);
                form.append('fileName',file.name);
                form.append('fileSize',file.size);

                updateChunkStatus(i, 'doing');
                addLog(`开始上传分片${i}，接口 /api/chunk/upload`, 'log-info');
                await fetch('/api/chunk/upload',{method:'POST',body:form});
                updateChunkStatus(i, 'done');
                addLog(`分片${i}上传完成`, 'log-success');
                uploadedChunkArr.push(i);

                const percent = Math.floor(((i+1)/totalChunk)*100);
                document.getElementById('bar').style.width = percent+'%';
                document.getElementById('tip').innerText = `已上传 ${percent}%`;
            }

            document.getElementById('tip').innerText = '正在请求后端合并分片文件...';
            addLog("所有分片上传完毕，调用合并接口 /api/chunk/merge", 'log-info');
            const mergeRes = await fetch('/api/chunk/merge',{
                method:'POST',
                body:JSON.stringify({fileMd5}),
                headers:{'Content-Type':'application/json'}
            })
            const mergeData = await mergeRes.json();
            document.getElementById('tip').innerText = mergeData.code === 200 ? '✅ 合并任务已后台执行，可下方表格查看最终状态' : mergeData.msg;
            toggleDataFlow(false);
            // 上传完毕刷新测试数据表格
            await loadRecordData();
        }

        // ==================== 性能表格、分页、导出CSV（全新逻辑，原有代码无修改） ====================
        async function loadRecordData(){
            try{
                const resp = await fetch(`/api/test/records?page=${currentPage}&pageSize=${pageSize}`);
                const {code,data} = await resp.json();
                if(code !==200) throw new Error('数据加载失败');
                const {list,total} = data;
                allRecordList = list;
                totalPage = Math.ceil(total / pageSize);
                renderTable(list);
                refreshPageBtn();
            }catch(e){
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="9">数据加载异常：${e.message}</td></tr>`;
            }
        }
        // 渲染表格
        function renderTable(list){
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if(list.length ===0){
                tbody.innerHTML = '<tr><td colspan="9">暂无上传测试记录</td></tr>';
                return;
            }
            const statusMap = {
                waiting_merge:'<span class="status-wait">等待合并</span>',
                merging:'<span class="status-merging">后台合并中</span>',
                success:'<span class="status-success">合并完成</span>',
                fail:'<span class="status-fail">合并失败</span>'
            };
            list.forEach(item=>{
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.file_md5.substring(0,18)}...</td>
                    <td>${item.file_name}</td>
                    <td>${formatFileSize(item.file_size)}</td>
                    <td>${item.chunk_total}</td>
                    <td>${item.use_time_ms || '-'}</td>
                    <td>${item.max_memory_mb || '-'}</td>
                    <td>${statusMap[item.task_status] || item.task_status}</td>
                    <td>${item.create_time || '-'}</td>
                    <td>${item.finish_time || '-'}</td>
                `;
                tbody.appendChild(tr);
            })
        }
        // 分页切换
        function changePage(step){
            let newPage = currentPage + step;
            if(newPage <1 || newPage>totalPage) return;
            currentPage = newPage;
            loadRecordData();
        }
        function refreshPageBtn(){
            document.getElementById('pageText').innerText = `第${currentPage}页 / 共${totalPage}页`;
            document.getElementById('prevBtn').disabled = currentPage <=1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPage;
        }
        // 导出CSV文件下载
        function exportTableCsv(){
            if(allRecordList.length ===0) return alert('暂无数据可导出');
            const header = ["文件MD5","文件名","文件大小(字节)","总分片","耗时ms","峰值内存MB","任务状态","创建时间","完成时间"];
            const rows = allRecordList.map(row=>[
                row.file_md5,
                row.file_name,
                row.file_size,
                row.chunk_total,
                row.use_time_ms||'',
                row.max_memory_mb||'',
                row.task_status,
                row.create_time||'',
                row.finish_time||''
            ]);
            let csvText = header.join(',') + '\n';
            rows.forEach(line=>{
                const safeLine = line.map(cell=> `"${String(cell).replace(/"/g,'""')}"`);
                csvText += safeLine.join(',') + '\n';
            })
            const blob = new Blob([csvText],{type:'text/csv;charset=utf-8;'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `分片上传性能测试数据_${new Date().getTime()}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
        }
    </script>
</body>
</html>
