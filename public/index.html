<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式大文件分片上传系统</title>
    <style>
        :root {
            --klein-blue: #002fa7;
            --klein-light: rgba(0, 47, 167, 0.15);
            --glass-white: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(0, 47, 167, 0.12);
            --shadow-soft: 0 8px 32px rgba(0, 47, 167, 0.08);
            --shadow-deep: 0 12px 48px rgba(0, 47, 167, 0.14);
            --color-wait: #b0c4de;
            --color-doing: #002fa7;
            --color-done: #00965e;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #ffffff;
            overflow-x: hidden;
            position: relative;
        }
        /* 全局数据流SVG容器 悬浮在所有面板中间 */
        .data-flow-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none; /* 不遮挡鼠标点击页面按钮 */
        }
        /* 流动线条基础样式 */
        .flow-line {
            fill: none;
            stroke: var(--klein-blue);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 12 8;
            animation: lineFlow 1.2s linear infinite;
            opacity: 0.4;
        }
        /* 数据流光点 */
        .flow-dot {
            r: 4;
            fill: var(--klein-blue);
            filter: drop-shadow(0 0 6px var(--klein-blue));
        }
        /* 全局科技背景 */
        .tech-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: bg-flow 18s linear infinite;
            opacity: 0.6;
        }
        .light-particle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, var(--klein-blue) 0%, transparent 70%);
            filter: blur(12px);
            opacity: 0.25;
            z-index: 0;
            animation: float 12s ease-in-out infinite alternate;
        }
        .p1 { width: 280px; height: 280px; top: 10%; left: 8%; animation-delay: 0s; }
        .p2 { width: 180px; height: 180px; bottom: 15%; right: 12%; animation-delay: -4s; }
        .p3 { width: 120px; height: 120px; top: 60%; left: 18%; animation-delay: -8s; }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 72px;
            padding: 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 99;
            background: var(--glass-white);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-title {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #000 0%, var(--klein-blue) 100%);
            background-clip: text;
            color: transparent;
        }
        .user-wrap {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .username-text {
            color: #001a52;
            font-weight: 500;
        }
        .logout-btn {
            padding: 10px 22px;
            border: 1px solid var(--klein-blue);
            border-radius: 12px;
            background: transparent;
            color: var(--klein-blue);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: var(--klein-light);
        }

        /* 主体容器 */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 96px;
            padding-bottom: 40px;
            position: relative;
            z-index: 10;
            gap: 32px;
        }
        /* 主上传卡片 */
        .upload-card {
            width: 920px;
            padding: 52px 48px;
            position: relative;
            background: var(--glass-white);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-deep);
            transition: all 0.4s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .upload-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 64px rgba(0, 47, 167, 0.18);
            border-color: rgba(0, 47, 167, 0.2);
        }
        .card-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #000 0%, var(--klein-blue) 100%);
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.4;
        }
        .file-input-wrap {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }
        #file {
            display: none;
        }
        .file-label {
            flex: 1;
            padding: 18px 24px;
            border: 1.5px dashed var(--klein-blue);
            border-radius: 14px;
            text-align: center;
            color: var(--klein-blue);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 47, 167, 0.04);
        }
        .file-label:hover {
            background: var(--klein-light);
            border-color: var(--klein-blue);
        }
        .upload-btn {
            padding: 18px 36px;
            border: none;
            border-radius: 14px;
            background: var(--klein-blue);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 47, 167, 0.22);
        }
        .upload-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 47, 167, 0.28);
        }
        .upload-btn:active {
            transform: translateY(0);
        }
        /* 总进度条 */
        .progress-wrap {
            height: 14px;
            background: rgba(0, 47, 167, 0.08);
            border-radius: 999px;
            margin: 36px 0 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #002fa7, #0040d0, #002fa7);
            background-size: 200% 100%;
            border-radius: 999px;
            transition: width 0.22s linear;
            animation: flow-shine 1.6s linear infinite;
        }
        .tip-text {
            text-align: center;
            font-size: 15px;
            color: #001a52;
            min-height: 24px;
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-bottom: 32px;
        }
        /* 扩展面板通用样式 */
        .panel {
            width: 920px;
            padding: 32px;
            background: var(--glass-white);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
        }
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--klein-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* 1. 文件信息面板 */
        .file-info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .info-item {
            padding: 16px;
            background: rgba(0,47,167,0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .info-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: #001a52;
            word-break: break-all;
        }
        /* 2. 分片可视化网格 */
        .chunk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 8px;
            min-height: 60px;
        }
        .chunk-block {
            height: 32px;
            border-radius: 6px;
            background: var(--color-wait);
            transition: all 0.25s ease;
        }
        .chunk-doing {
            background: var(--color-doing);
            animation: chunk-pulse 0.8s infinite alternate;
        }
        .chunk-done {
            background: var(--color-done);
        }
        /* 3. 运行日志面板 */
        .log-box {
            margin-top: 16px;
            height: 160px;
            padding: 16px;
            background: #000a20;
            border-radius: 12px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: 13px;
            color: #89c4ff;
            line-height: 1.6;
        }
        .log-line {
            margin-bottom: 4px;
        }
        .log-success {
            color: #71e0a8;
        }
        .log-warn {
            color: #ffdd70;
        }
        .log-info {
            color: #89c4ff;
        }
        /* 动画定义 */
        @keyframes bg-flow {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.12); }
        }
        @keyframes flow-shine {
            0% { background-position: 0 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes chunk-pulse {
            0% { opacity: 0.7; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* 数据流线条流动动画 */
        @keyframes lineFlow {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -20; }
        }
    </style>
</head>
<body>
    <!-- 新增：三层数据流连接线SVG（核心动效） -->
    <svg class="data-flow-svg" viewBox="0 0 1920 1080">
        <!-- 第一层：上传卡片 → 文件信息面板 -->
        <path id="path1" class="flow-line" d="M 960 320 L 960 460" />
        <circle class="flow-dot">
            <animateMotion dur="2s" repeatCount="indefinite" path="M 960 320 L 960 460" />
        </circle>
        <!-- 第二层：文件信息面板 → 分片网格面板 -->
        <path id="path2" class="flow-line" d="M 960 540 L 960 680" />
        <circle class="flow-dot">
            <animateMotion dur="2.2s" repeatCount="indefinite" path="M 960 540 L 960 680" />
        </circle>
        <!-- 第三层：分片网格面板 → 后端日志面板 -->
        <path id="path3" class="flow-line" d="M 960 760 L 960 900" />
        <circle class="flow-dot">
            <animateMotion dur="2.4s" repeatCount="indefinite" path="M 960 760 L 960 900" />
        </circle>
    </svg>

    <!-- 全局动态背景 -->
    <div class="tech-bg"></div>
    <div class="light-particle p1"></div>
    <div class="light-particle p2"></div>
    <div class="light-particle p3"></div>

    <!-- 顶部导航 -->
    <div class="navbar">
        <div class="nav-title">分布式大文件分片上传集群系统</div>
        <div class="user-wrap">
            <span class="username-text" id="userText"></span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <!-- 核心上传卡片 -->
        <div class="upload-card">
            <h2 class="card-title">基于双节点集群的大文件分片上传演示</h2>
            <div class="file-input-wrap">
                <label class="file-label" for="file">点击选择待上传大文件</label>
                <input type="file" id="file" />
                <button class="upload-btn" onclick="uploadFile()">开始上传</button>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="bar"></div>
            </div>
            <div id="tip" class="tip-text"></div>
        </div>

        <!-- 扩展面板1：文件基础信息 -->
        <div class="panel" id="infoPanel" style="display: none;">
            <h3 class="panel-title">📄 文件基础信息</h3>
            <div class="file-info-grid">
                <div class="info-item">
                    <div class="info-label">文件名称</div>
                    <div class="info-value" id="infoName">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">文件大小</div>
                    <div class="info-value" id="infoSize">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">分片总数</div>
                    <div class="info-value" id="infoChunkTotal">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">文件MD5</div>
                    <div class="info-value" id="infoMd5">-</div>
                </div>
            </div>
        </div>

        <!-- 扩展面板2：分片可视化动画面板 -->
        <div class="panel" id="chunkPanel" style="display: none;">
            <h3 class="panel-title">📦 分片实时上传可视化</h3>
            <div class="chunk-grid" id="chunkGrid"></div>
            <div style="display:flex;gap:24px;margin-top:16px;font-size:13px;color:#555;">
                <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;background:var(--color-wait);border-radius:4px;"></span>待上传</span>
                <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;background:var(--color-doing);border-radius:4px;"></span>上传中</span>
                <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;background:var(--color-done);border-radius:4px;"></span>已完成</span>
            </div>
        </div>

        <!-- 扩展面板3：后端交互日志 -->
        <div class="panel" id="logPanel" style="display: none;">
            <h3 class="panel-title">📡 后端分片交互实时日志</h3>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <script>
        // 数据流动画全局控制函数
        function toggleDataFlow(flag) {
            const lines = document.querySelectorAll('.flow-line');
            const dots = document.querySelectorAll('.flow-dot animateMotion');
            if(flag === true) {
                // 开启流动动画
                lines.forEach(el => el.style.opacity = "0.55");
                dots.forEach(el => el.beginElement());
            } else {
                // 关闭流动动画
                lines.forEach(el => el.style.opacity = "0");
                dots.forEach(el => el.endElement());
            }
        }

        // 鉴权：未登录跳转登录页
        window.onload = function() {
            const user = localStorage.getItem('uploadUser');
            if(!user) {
                location.href = 'login.html';
                return;
            }
            const userInfo = JSON.parse(user);
            document.getElementById('userText').innerText = `欢迎，${userInfo.username}`;
            // 页面初始关闭数据流动画
            toggleDataFlow(false);
        }
        // 退出登录
        function logout() {
            localStorage.removeItem('uploadUser');
            location.href = 'login.html';
        }

        // 全局扩展变量
        const CHUNK_SIZE = 1024 * 1024 * 2; // 2M分片 原逻辑不变
        let fileMd5 = '';
        let currentFile = null;
        let totalChunkCount = 0;
        let uploadedChunkArr = [];

        // 工具：格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }
        // 工具：写入日志
        function addLog(text, type = 'log-info') {
            const logBox = document.getElementById('logBox');
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const now = new Date().toLocaleTimeString();
            line.innerText = `[${now}] ${text}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }
        // 工具：初始化分片可视化网格
        function initChunkGrid(total) {
            totalChunkCount = total;
            const grid = document.getElementById('chunkGrid');
            grid.innerHTML = '';
            for(let i=0; i<total; i++){
                const block = document.createElement('div');
                block.className = 'chunk-block';
                block.dataset.index = i;
                grid.appendChild(block);
            }
        }
        // 更新单个分片状态
        function updateChunkStatus(index, status) {
            const block = document.querySelector(`.chunk-block[data-index="${index}"]`);
            if(!block) return;
            block.classList.remove('chunk-doing', 'chunk-done');
            if(status === 'doing') block.classList.add('chunk-doing');
            if(status === 'done') block.classList.add('chunk-done');
        }

        // ===================== 原有分片上传核心逻辑【完全无修改，仅插入数据流动画控制】=====================
        // 离线文件MD5计算（原生实现，无需任何外网依赖）
        async function getFileMd5(file) {
            addLog("开始计算文件MD5哈希值...", 'log-info');
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('MD5', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const md5Str = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            addLog(`MD5计算完成：${md5Str}`, 'log-success');
            return md5Str;
        }

        // 分片上传主入口
        async function uploadFile() {
            const file = document.getElementById('file').files[0];
            if(!file) return alert('请选择文件');
            currentFile = file;
            // 展示全部扩展面板 + 启动数据流连线动画
            document.getElementById('infoPanel').style.display = 'block';
            document.getElementById('chunkPanel').style.display = 'block';
            document.getElementById('logPanel').style.display = 'block';
            toggleDataFlow(true);

            // 填充文件信息卡片
            document.getElementById('infoName').innerText = file.name;
            document.getElementById('infoSize').innerText = formatFileSize(file.size);
            document.getElementById('tip').innerText = '正在计算文件MD5...';
            fileMd5 = await getFileMd5(file);
            document.getElementById('infoMd5').innerText = fileMd5;

            // 查询已上传分片（断点续传）
            addLog("请求后端接口：查询已上传分片 /api/chunk/check", 'log-info');
            const res = await fetch('/api/chunk/check', {
                method:'POST',
                body:JSON.stringify({fileMd5}),
                headers:{'Content-Type':'application/json'}
            })
            const {data} = await res.json();
            uploadedChunkArr = data.map(item => Number(item));
            addLog(`后端返回已上传分片：${uploadedChunkArr.join(',')}`, 'log-warn');

            const totalChunk = Math.ceil(file.size / CHUNK_SIZE);
            totalChunkCount = totalChunk;
            document.getElementById('infoChunkTotal').innerText = totalChunk;
            initChunkGrid(totalChunk);
            // 回填已完成分片色块
            uploadedChunkArr.forEach(idx => updateChunkStatus(idx, 'done'));

            document.getElementById('tip').innerText = '开始分片上传';
            addLog(`文件总分片数：${totalChunk}，准备循环上传`, 'log-info');

            // 循环上传分片
            for(let i=0;i<totalChunk;i++){
                if(uploadedChunkArr.includes(i)) {
                    addLog(`分片${i}已存在，跳过上传（断点续传）`, 'log-warn');
                    continue;
                }
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunkFile = file.slice(start,end);

                const form = new FormData();
                form.append('file',chunkFile);
                form.append('fileMd5',fileMd5);
                form.append('chunkIndex',i);
                form.append('totalChunk',totalChunk);
                form.append('fileName',file.name);
                form.append('fileSize',file.size);

                // 可视化：标记当前分片上传中
                updateChunkStatus(i, 'doing');
                addLog(`开始上传分片${i}，接口 /api/chunk/upload`, 'log-info');
                await fetch('/api/chunk/upload',{
                    method:'POST',
                    body:form
                })
                // 上传完成标记
                updateChunkStatus(i, 'done');
                addLog(`分片${i}上传完成`, 'log-success');
                uploadedChunkArr.push(i);

                // 更新全局总进度条
                const percent = Math.floor(((i+1)/totalChunk)*100);
                document.getElementById('bar').style.width = percent+'%';
                document.getElementById('tip').innerText = `已上传 ${percent}%`;
            }

            // 上传完成合并文件
            document.getElementById('tip').innerText = '正在请求后端合并分片文件...';
            addLog("所有分片上传完毕，调用合并接口 /api/chunk/merge", 'log-info');
            const mergeRes = await fetch('/api/chunk/merge',{
                method:'POST',
                body:JSON.stringify({fileMd5}),
                headers:{'Content-Type':'application/json'}
            })
            const mergeData = await mergeRes.json();
            if(mergeData.code === 200){
                document.getElementById('tip').innerText = '✅ 文件上传合并完成！';
                addLog("后端分片合并成功，完整文件生成", 'log-success');
            }else{
                document.getElementById('tip').innerText = mergeData.msg;
                addLog(`合并失败：${mergeData.msg}`, 'log-warn');
            }
            // 全部流程结束，关闭数据流动画
            toggleDataFlow(false);
        }
    </script>
</body>
</html>
